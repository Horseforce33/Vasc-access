<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Login | Midline Mastery</title>
  <link rel="stylesheet" href="midline.css" />
  <script type="module" src="auth.js"></script>
</head>
<body class="login-page">

  <div class="login-box">
    <h2>Midline Mastery</h2>
    <p>Please log in to access the course</p>

    <form id="loginForm">
      <input type="email" id="email" placeholder="Email" required />
      <input type="password" id="password" placeholder="Password" required />
      <button type="submit">Log in</button>
    </form>

    <p id="error" class="error"></p>
  </div>

</body>
</html>
